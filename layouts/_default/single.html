{{ define "main" }}

<article class="single-page-content">
  <header>
    <h1 style="font-family: var(--font-serif); font-weight: 300;">{{ .Title }}</h1>
    
    {{ if eq .Section "blog" }}
      <div class="post-meta">
        <span>Published on {{ .Date.Format "January 2, 2006" }}</span>
        {{ if .Params.author }}
          <span style="margin-left: 1.5rem;">By {{ .Params.author }}</span>
        {{ end }}
      </div>
    {{ else }}
      <div style="height: 2px; background: var(--border-light); margin: 1.5rem 0 3rem 0;"></div>
    {{ end }}
  </header>

  {{ if .Params.image }}
    <div style="margin-bottom: 3rem; width: 100%; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; aspect-ratio: 16/9;">
      <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
  {{ end }}

  <div class="post-body">
    {{ .Content }}
  </div>
</article>

{{ end }}
